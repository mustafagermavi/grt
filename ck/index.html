<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="telegram-web-app" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Crash Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-white overflow-hidden">
    <div id="app" class="app-container">
        
        <!-- User Header - Telegram Style -->
        <div class="user-header">
            <div class="user-info">
                <div class="user-avatar" id="user-avatar">?</div>
                <div class="user-name" id="user-name">Loading...</div>
            </div>
            <div class="user-balance">
                <span class="balance-label">BALANCE</span>
                <span class="balance-value" id="user-balance">1000</span>
                <span class="balance-currency">🪙</span>
            </div>
        </div>

        <!-- Results History Bar -->
        <div class="history-bar">
            <div id="history-list" class="history-items"></div>
        </div>

        <!-- Game Canvas Area (Top 40%) -->
        <div class="game-canvas-container">
            <canvas id="gameCanvas"></canvas>
            
            <!-- Huge Centered Multiplier -->
            <div class="multiplier-container">
                <div id="multiplier-value" class="multiplier-display">1.00<span class="multiplier-x">x</span></div>
                <div id="multiplier-status" class="multiplier-status">WAITING</div>
            </div>

            <!-- Waiting Countdown Timer -->
            <div id="waiting-timer" class="waiting-timer hidden">
                <div class="timer-label">NEXT ROUND</div>
                <div id="timer-value" class="timer-value">3</div>
            </div>

            <!-- Crash Message -->
            <div id="crash-overlay" class="crash-overlay hidden">
                <div class="crash-box">
                    <div class="crash-text">FLEW AWAY</div>
                    <div id="crash-multiplier" class="crash-multiplier">@ 1.00x</div>
                </div>
            </div>

            <!-- Provably Fair Shield -->
            <div class="provably-shield" id="provably-shield" title="Click to verify fairness">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3z"/>
                </svg>
            </div>
        </div>

        <!-- Betting Controls (Bottom 60%) -->
        <div class="betting-area">
            <!-- Bet Panel 1 -->
            <div class="bet-block" id="panel-1">
                <div class="bet-input-section">
                    <div class="amount-input-wrapper">
                        <input type="number" id="bet-amount-1" class="amount-input" value="10" min="1" step="1">
                        <span class="currency-label">🪙</span>
                    </div>
                </div>

                <!-- Quick Stake Buttons [1, 5, 10, 50] -->
                <div class="quick-stakes">
                    <button class="stake-btn" data-panel="1" data-amount="1">1</button>
                    <button class="stake-btn" data-panel="1" data-amount="5">5</button>
                    <button class="stake-btn" data-panel="1" data-amount="10">10</button>
                    <button class="stake-btn" data-panel="1" data-amount="50">50</button>
                </div>

                <!-- Auto Cash-out -->
                <div class="auto-cashout">
                    <label class="auto-label">AUTO CASH OUT @</label>
                    <div class="auto-input-wrapper">
                        <input type="number" id="auto-cashout-1" class="auto-input" value="2.00" min="1.01" step="0.01">
                        <span class="auto-x">x</span>
                    </div>
                </div>

                <!-- Main Action Button -->
                <button id="bet-btn-1" class="main-action-btn place">
                    <span class="btn-main-text">PLACE BET</span>
                    <span class="btn-potential hidden"></span>
                </button>
            </div>

            <!-- Bet Panel 2 -->
            <div class="bet-block" id="panel-2">
                <div class="bet-input-section">
                    <div class="amount-input-wrapper">
                        <input type="number" id="bet-amount-2" class="amount-input" value="10" min="1" step="1">
                        <span class="currency-label">🪙</span>
                    </div>
                </div>

                <!-- Quick Stake Buttons [1, 5, 10, 50] -->
                <div class="quick-stakes">
                    <button class="stake-btn" data-panel="2" data-amount="1">1</button>
                    <button class="stake-btn" data-panel="2" data-amount="5">5</button>
                    <button class="stake-btn" data-panel="2" data-amount="10">10</button>
                    <button class="stake-btn" data-panel="2" data-amount="50">50</button>
                </div>

                <!-- Auto Cash-out -->
                <div class="auto-cashout">
                    <label class="auto-label">AUTO CASH OUT @</label>
                    <div class="auto-input-wrapper">
                        <input type="number" id="auto-cashout-2" class="auto-input" value="2.00" min="1.01" step="0.01">
                        <span class="auto-x">x</span>
                    </div>
                </div>

                <!-- Main Action Button -->
                <button id="bet-btn-2" class="main-action-btn place">
                    <span class="btn-main-text">PLACE BET</span>
                    <span class="btn-potential hidden"></span>
                </button>
            </div>
        </div>

        <!-- Hash Modal -->
        <div id="hash-modal" class="hash-modal hidden">
            <div class="hash-modal-content">
                <div class="hash-title">PROVABLY FAIR</div>
                <div class="hash-data">
                    <div class="hash-row">
                        <span class="hash-label">Server Seed:</span>
                        <span class="hash-value" id="server-seed">-</span>
                    </div>
                    <div class="hash-row">
                        <span class="hash-label">Current Hash:</span>
                        <span class="hash-value" id="current-hash">-</span>
                    </div>
                    <div class="hash-row">
                        <span class="hash-label">Nonce:</span>
                        <span class="hash-value" id="nonce-value">-</span>
                    </div>
                </div>
                <button id="close-hash" class="hash-close-btn">CLOSE</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- JavaScript Modules - Load in dependency order -->
    <script src="provably-fair.js"></script>
    <script src="game-engine.js"></script>
    <script src="betting-logic.js"></script>
    <script src="main.js"></script>
</body>
</html>
