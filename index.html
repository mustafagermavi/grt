<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kurdex VIP Crash</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e11; --panel: #1e2329; --accent: #00ff88;
            --danger: #ff3e3e; --gold: #f3ba2f; --blue: #3498db;
        }

        body { 
            background: var(--bg); color: white; font-family: 'Press Start 2P', cursive; 
            margin: 0; display: flex; flex-direction: column; align-items: center;
            user-select: none; touch-action: manipulation;
        }

        /* Header & History */
        .header { width: 100%; padding: 15px; display: flex; justify-content: space-between; font-size: 10px; box-sizing: border-box; background: #161a1e; }
        .history-bar { 
            width: 100%; height: 40px; background: #000; display: flex; 
            align-items: center; gap: 10px; padding: 0 15px; overflow-x: auto; border-bottom: 2px solid #333;
        }
        .h-item { padding: 4px 8px; border-radius: 4px; font-size: 8px; font-weight: bold; }
        .low { background: var(--blue); } .mid { background: #9b59b6; } .high { background: var(--gold); color: #000; }

        /* Game Stage */
        .stage {
            width: 95%; max-width: 500px; height: 260px; background: radial-gradient(circle, #1a1f2c, #0b0e11);
            margin: 15px 0; border: 4px solid #333; position: relative; overflow: hidden;
        }
        #multiplier {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2.5rem; color: var(--accent); text-shadow: 4px 4px #000; z-index: 10;
        }
        #plane {
            position: absolute; bottom: 20px; left: 20px; width: 45px; height: 30px;
            background: var(--danger); box-shadow: 6px 6px 0 #900; display: none; z-index: 11;
        }

        /* Double Betting Area */
        .bet-container { width: 95%; max-width: 500px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .bet-box { background: var(--panel); padding: 15px; border-radius: 8px; border-bottom: 4px solid #111; text-align: center; }
        input { 
            width: 80%; background: #000; border: 2px solid #444; color: var(--accent); 
            padding: 8px; font-family: 'Press Start 2P'; font-size: 10px; margin-bottom: 10px;
        }
        .bet-btn { 
            width: 100%; padding: 15px 0; font-family: 'Press Start 2P'; font-size: 11px; 
            border: none; cursor: pointer; color: white; border-bottom: 5px solid rgba(0,0,0,0.3);
        }
        .btn-ready { background: #2ebd85; }
        .btn-cash { background: var(--gold); color: #000; }
        .btn-wait { background: #555; pointer-events: none; }

        /* Animation */
        .grid { position: absolute; width: 200%; height: 100%; background-image: linear-gradient(#333 1px, transparent 1px), linear-gradient(90deg, #333 1px, transparent 1px); background-size: 40px 40px; opacity: 0.2; animation: moveGrid 3s linear infinite; }
        @keyframes moveGrid { from { transform: translate(0, 0); } to { transform: translate(-40px, 40px); } }
    </style>
</head>
<body>

    <div class="header">
        <span style="color:var(--accent)">ID: 88291</span>
        <span id="bal-val" style="color:var(--gold)">1000.00 IQD</span>
    </div>

    <div class="history-bar" id="history">
        </div>

    <div class="stage">
        <div class="grid"></div>
        <div id="plane"></div>
        <div id="multiplier">1.00x</div>
    </div>

    <div class="bet-container">
        <div class="bet-box">
            <input type="number" id="amt1" value="100">
            <button id="btn1" class="bet-btn btn-ready" onclick="placeBet(1)">BET</button>
        </div>
        <div class="bet-box">
            <input type="number" id="amt2" value="100">
            <button id="btn2" class="bet-btn btn-ready" onclick="placeBet(2)">BET</button>
        </div>
    </div>

    <script>
        let balance = 1000.00;
        let mult = 1.00;
        let isFlying = false;
        let crashPoint = 0;
        let bets = {
            1: { active: false, amount: 0, cashed: false },
            2: { active: false, amount: 0, cashed: false }
        };

        function placeBet(id) {
            const amtInput = document.getElementById('amt' + id);
            const btn = document.getElementById('btn' + id);
            let amount = parseFloat(amtInput.value);

            if (!isFlying && !bets[id].active) {
                if (amount > balance) return;
                balance -= amount;
                bets[id].active = true;
                bets[id].amount = amount;
                bets[id].cashed = false;
                btn.innerText = "WAITING";
                btn.className = "bet-btn btn-wait";
                updateUI();
            } else if (isFlying && bets[id].active && !bets[id].cashed) {
                // Cash Out
                let win = parseFloat((bets[id].amount * mult).toFixed(2));
                balance += win;
                bets[id].cashed = true;
                btn.innerText = win.toFixed(0);
                btn.className = "bet-btn btn-wait";
                updateUI();
            }
        }

        function gameLoop() {
            isFlying = false;
            document.getElementById('multiplier').style.color = "var(--accent)";
            document.getElementById('multiplier').innerText = "WAITING...";
            
            setTimeout(() => {
                startFlight();
            }, 4000);
        }

        function startFlight() {
            isFlying = true;
            mult = 1.00;
            crashPoint = (Math.random() * 8 + 1.05).toFixed(2);
            document.getElementById('plane').style.display = "block";
            
            // Update buttons that were waiting
            for(let i=1; i<=2; i++) {
                if(bets[i].active) {
                    document.getElementById('btn' + i).innerText = "CASH OUT";
                    document.getElementById('btn' + i).className = "bet-btn btn-cash";
                }
            }
            updateFlight();
        }

        function updateFlight() {
            if (!isFlying) return;
            mult += 0.008 * Math.pow(mult, 1.1);
            document.getElementById('multiplier').innerText = mult.toFixed(2) + "x";

            let pos = (mult - 1) * 30;
            document.getElementById('plane').style.bottom = (20 + pos) + "px";
            document.getElementById('plane').style.left = (20 + pos * 1.4) + "px";

            if (mult >= crashPoint) {
                crash();
            } else {
                requestAnimationFrame(updateFlight);
            }
        }

        function crash() {
            isFlying = false;
            document.getElementById('multiplier').innerText = "FLEW AWAY!";
            document.getElementById('multiplier').style.color = "var(--danger)";
            document.getElementById('plane').style.display = "none";
            
            addHistory(mult);

            // Reset buttons
            for(let i=1; i<=2; i++) {
                bets[i].active = false;
                document.getElementById('btn' + i).innerText = "BET";
                document.getElementById('btn' + i).className = "bet-btn btn-ready";
            }
            setTimeout(gameLoop, 3000);
        }

        function addHistory(val) {
            const h = document.getElementById('history');
            const item = document.createElement('div');
            let type = val < 2 ? 'low' : (val < 10 ? 'mid' : 'high');
            item.className = `h-item ${type}`;
            item.innerText = parseFloat(val).toFixed(2) + "x";
            h.prepend(item);
        }

        function updateUI() {
            document.getElementById('bal-val').innerText = balance.toFixed(2) + " IQD";
        }

        gameLoop();
    </script>
</body>
</html>
