<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kurdex Pixel Aviator</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --accent: #00ff88; --danger: #ff3e3e; --gold: #f3ba2f; }
        body { background: var(--bg); color: white; font-family: 'Press Start 2P', cursive; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 90%; padding: 20px; display: flex; justify-content: space-between; font-size: 10px; color: var(--gold); }

        /* گۆڕەپانی فڕین */
        .game-area {
            width: 95%; max-width: 500px; height: 300px; background: #161a1e; 
            border: 4px solid #333; position: relative; overflow: hidden; margin-bottom: 20px;
        }

        /* فڕۆکە پیکسڵییەکە (بە CSS دروستکراوە) */
        #plane {
            position: absolute; bottom: 20px; left: 20px; width: 40px; height: 25px;
            background: var(--danger); box-shadow: 5px 5px 0 #900, -5px 0 0 var(--danger), 0 -5px 0 var(--danger);
            display: none; z-index: 10;
        }
        #plane::after { content: ''; position: absolute; right: -10px; top: 5px; width: 10px; height: 5px; background: white; opacity: 0.6; } /* دووکەڵی پیکسڵی */

        #multiplier {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2.2rem; color: var(--accent); text-shadow: 3px 3px #000; z-index: 5;
        }

        .stars { position: absolute; width: 200%; height: 100%; background: radial-gradient(white 1px, transparent 1px); background-size: 40px 40px; animation: move 5s linear infinite; opacity: 0.2; }
        @keyframes move { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* کۆنتڕۆڵ */
        .controls { width: 90%; max-width: 500px; background: #1e2329; padding: 20px; border-radius: 10px; text-align: center; }
        input { background: #000; border: 2px solid #444; color: var(--accent); padding: 10px; font-family: 'Press Start 2P'; width: 60%; margin-bottom: 10px; text-align: center; }
        .main-btn { width: 100%; padding: 20px; font-family: 'Press Start 2P'; border: none; cursor: pointer; border-bottom: 6px solid rgba(0,0,0,0.3); font-size: 12px; }
        .btn-ready { background: #2ebd85; color: white; }
        .btn-cash { background: var(--gold); color: black; }
    </style>
</head>
<body>

    <div class="header">
        <span>KURDEX APP</span>
        <span id="bal">1000 IQD</span>
    </div>

    <div class="game-area">
        <div class="stars"></div>
        <div id="plane"></div>
        <div id="multiplier">1.00x</div>
    </div>

    <div class="controls">
        <input type="number" id="amt" value="100">
        <button id="btn" class="main-btn btn-ready" onclick="start()">PLACE BET</button>
    </div>

    <script>
        let balance = 1000; let mult = 1.00; let flying = false; let crashAt = 0; let bet = 0;
        const plane = document.getElementById('plane');
        const mDisplay = document.getElementById('multiplier');
        const bDisplay = document.getElementById('bal');
        const btn = document.getElementById('btn');

        function start() {
            if (!flying) {
                let a = parseInt(document.getElementById('amt').value);
                if (a > balance) return;
                balance -= a; bet = a; bDisplay.innerText = balance + " IQD";
                
                flying = true; mult = 1.00; crashAt = (Math.random() * 6 + 1.1).toFixed(2);
                plane.style.display = "block"; plane.style.bottom = "20px"; plane.style.left = "20px";
                btn.innerText = "CASH OUT"; btn.className = "main-btn btn-cash";
                update();
            } else {
                let win = Math.floor(bet * mult); balance += win;
                bDisplay.innerText = balance + " IQD";
                stop("WIN: " + win, "var(--accent)");
            }
        }

        function update() {
            if (!flying) return;
            mult += 0.01 * Math.pow(mult, 1.1);
            mDisplay.innerText = mult.toFixed(2) + "x";
            
            // جوڵەی فڕۆکەکە بەرەو سەرەوە
            let pos = (mult - 1) * 35;
            plane.style.bottom = (20 + pos) + "px";
            plane.style.left = (20 + pos * 1.5) + "px";

            if (mult >= crashAt) {
                stop("BOOM!", "var(--danger)");
            } else {
                requestAnimationFrame(update);
            }
        }

        function stop(msg, color) {
            flying = false;
            mDisplay.innerText = msg;
            mDisplay.style.color = color;
            plane.style.display = "none";
            btn.innerText = "WAIT...";
            btn.disabled = true;
            setTimeout(() => {
                mDisplay.innerText = "1.00x";
                mDisplay.style.color = "var(--accent)";
                btn.innerText = "PLACE BET";
                btn.className = "main-btn btn-ready";
                btn.disabled = false;
            }, 2000);
        }
    </script>
</body>
</html>
