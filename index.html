<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kurdex Pixel Masterpiece</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e11; --panel: #1b1c20; --red: #ff3e3e;
            --green: #2ebd85; --gold: #f3ba2f; --pixel-size: 4px;
        }

        body { 
            background: var(--bg); color: white; font-family: 'Press Start 2P', cursive; 
            margin: 0; display: flex; flex-direction: column; align-items: center;
            image-rendering: pixelated; overflow: hidden; height: 100vh;
        }

        /* Top Nav & History */
        .header { width: 100%; padding: 15px; display: flex; justify-content: space-between; font-size: 8px; background: #161a1e; border-bottom: 2px solid #282a2f; }
        .history { width: 100%; height: 35px; background: #000; display: flex; align-items: center; gap: 8px; padding: 0 15px; overflow-x: auto; border-bottom: 1px solid #333; }
        .h-tag { padding: 4px 8px; border-radius: 4px; font-size: 7px; color: #fff; min-width: 40px; text-align: center; }
        .blue { background: #3498db; } .purp { background: #9b59b6; } .high { background: var(--gold); color: #000; }

        /* Pixel Game Stage */
        .stage {
            width: 95%; max-width: 500px; height: 300px; background: #121214;
            margin-top: 10px; border: 4px solid #282a2f; position: relative; overflow: hidden;
        }
        .grid { position: absolute; width: 200%; height: 200%; background-image: linear-gradient(#222 1px, transparent 1px), linear-gradient(90deg, #222 1px, transparent 1px); background-size: 40px 40px; opacity: 0.4; animation: gridMove 5s linear infinite; }
        @keyframes gridMove { from { transform: translate(0, 0); } to { transform: translate(-40px, 40px); } }

        #mult { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 2.5rem; color: #fff; z-index: 10; text-shadow: 4px 4px #000; }

        /* The Pixel Plane */
        #plane-wrap { position: absolute; bottom: 20px; left: 20px; z-index: 5; display: none; }
        .pixel-plane {
            width: 40px; height: 25px; background: var(--red);
            box-shadow: 
                4px 0 0 var(--red), 8px 0 0 var(--red),
                0 4px 0 #900, 4px 4px 0 #900,
                -4px 4px 0 var(--red), -8px 8px 0 var(--red); /* Pixel Shape */
        }
        .smoke { position: absolute; width: 6px; height: 6px; background: rgba(255,255,255,0.4); border-radius: 0; }

        /* Double Betting Panel */
        .bet-grid { width: 95%; max-width: 500px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .bet-card { background: var(--panel); padding: 12px; border-radius: 10px; border: 2px solid #333; display: flex; flex-direction: column; gap: 8px; }
        
        .inp-row { background: #000; padding: 10px; border-radius: 5px; border: 1px solid #444; }
        input { background: transparent; border: none; color: var(--gold); font-family: 'Press Start 2P'; font-size: 10px; width: 100%; text-align: center; outline: none; }
        
        .main-btn { width: 100%; padding: 18px 0; font-family: 'Press Start 2P'; font-size: 10px; border: none; border-radius: 8px; cursor: pointer; color: white; transition: 0.1s; }
        .btn-bet { background: var(--green); border-bottom: 5px solid #1e7e34; }
        .btn-cash { background: var(--gold); color: #000; border-bottom: 5px solid #a67c00; }
        .btn-wait { background: #444; border: none; opacity: 0.6; cursor: not-allowed; }
        .main-btn:active:not(.btn-wait) { transform: translateY(4px); border-bottom: none; }

        @media (max-width: 450px) { .bet-grid { grid-template-columns: 1fr; } #mult { font-size: 1.8rem; } }
    </style>
</head>
<body>

    <div class="header">
        <span>MUSTAFA PRO</span>
        <span id="bal-txt" style="color:var(--gold)">1000.00 IQD</span>
    </div>

    <div class="history" id="h-box"></div>

    <div class="stage" id="stage">
        <div class="grid"></div>
        <div id="mult">1.00x</div>
        <div id="plane-wrap">
            <div class="pixel-plane"></div>
        </div>
    </div>

    <div class="bet-grid">
        <div class="bet-card">
            <div class="inp-row"><input type="number" id="amt1" value="100"></div>
            <button id="btn1" class="main-btn btn-bet" onclick="handleBet(1)">BET</button>
        </div>
        <div class="bet-card">
            <div class="inp-row"><input type="number" id="amt2" value="100"></div>
            <button id="btn2" class="main-btn btn-bet" onclick="handleBet(2)">BET</button>
        </div>
    </div>

    <script>
        let balance = 1000.00;
        let mult = 1.00;
        let isFlying = false;
        let crashAt = 0;
        let bets = { 1: { active: false, amt: 0, cashed: false }, 2: { active: false, amt: 0, cashed: false } };

        const planeWrap = document.getElementById('plane-wrap');
        const multEl = document.getElementById('mult');

        function startRound() {
            isFlying = true;
            mult = 1.00;
            crashAt = (0.99 / (1 - Math.random())).toFixed(2);
            if (crashAt < 1.0) crashAt = 1.05;
            
            planeWrap.style.display = "block";
            multEl.style.color = "var(--green)";
            
            for(let i=1; i<=2; i++) {
                if(bets[i].active) {
                    const btn = document.getElementById('btn' + i);
                    btn.innerText = "CASH OUT";
                    btn.className = "main-btn btn-cash";
                }
            }
            tick();
        }

        function tick() {
            if (!isFlying) return;
            mult += 0.001 * Math.pow(mult, 1.35);
            multEl.innerText = mult.toFixed(2) + "x";

            // Curve Physics
            let x = Math.min((mult - 1) * 80, 350);
            let y = Math.min(Math.pow(mult - 1, 1.2) * 50, 220);
            planeWrap.style.left = (20 + x) + "px";
            planeWrap.style.bottom = (20 + y) + "px";

            createSmoke(20 + x, 20 + y);

            if (mult >= crashAt) {
                crash();
            } else {
                requestAnimationFrame(tick);
            }
        }

        function createSmoke(x, y) {
            const s = document.createElement('div');
            s.className = 'smoke';
            s.style.left = (x + 5) + 'px';
            s.style.bottom = (y + 5) + 'px';
            document.getElementById('stage').appendChild(s);
            setTimeout(() => s.remove(), 800);
        }

        function crash() {
            isFlying = false;
            multEl.innerText = "FLEW AWAY!";
            multEl.style.color = "var(--red)";
            planeWrap.style.display = "none";
            
            addHistory(mult);
            for(let i=1; i<=2; i++) {
                bets[i].active = false;
                const btn = document.getElementById('btn' + i);
                btn.innerText = "BET";
                btn.className = "main-btn btn-bet";
            }
            setTimeout(waitPhase, 3000);
        }

        function waitPhase() {
            multEl.innerText = "WAITING...";
            multEl.style.color = "#fff";
            setTimeout(startRound, 5000);
        }

        function handleBet(id) {
            const amt = parseFloat(document.getElementById('amt' + id).value);
            const btn = document.getElementById('btn' + id);

            if (!isFlying && !bets[id].active) {
                if (amt > balance) return;
                balance -= amt;
                bets[id] = { active: true, amt: amt, cashed: false };
                btn.innerText = "WAIT...";
                btn.className = "main-btn btn-wait";
                updateUI();
            } else if (isFlying && bets[id].active && !bets[id].cashed) {
                let win = (bets[id].amt * mult).toFixed(2);
                balance += parseFloat(win);
                bets[id].cashed = true;
                btn.innerText = "+" + Math.floor(win);
                btn.className = "main-btn btn-wait";
                updateUI();
            }
        }

        function addHistory(v) {
            const h = document.getElementById('h-box');
            const item = document.createElement('div');
            let cls = v < 2 ? 'blue' : (v < 10 ? 'purp' : 'high');
            item.className = `h-tag ${cls}`;
            item.innerText = parseFloat(v).toFixed(2) + 'x';
            h.prepend(item);
        }

        function updateUI() { document.getElementById('bal-txt').innerText = balance.toFixed(2) + " IQD"; }

        waitPhase();
    </script>
</body>
</html>
