<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Official Clone</title>
    <style>
        :root {
            --bg-dark: #121214;
            --panel-bg: #1b1c20;
            --aviator-red: #d1021c;
            --win-green: #28a745;
            --cashout-gold: #ffaa00;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif, Arial;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Navigation */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #1b1c20;
            border-bottom: 2px solid #25252a;
        }

        .balance {
            color: #28a745;
            font-weight: bold;
            font-size: 15px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* History */
        .history {
            display: flex;
            gap: 6px;
            padding: 8px 15px;
            background: #121214;
            overflow-x: auto;
            white-space: nowrap;
        }

        .h-node {
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
        }
        .blue { background: #3498db; }
        .purple { background: #9b59b6; }
        .gold { background: #c2951d; }

        /* Main Game Area */
        .game-view {
            flex-grow: 1;
            position: relative;
            background: #161618;
            margin: 10px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #282a2f;
        }

        #multiplier {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: 900;
            z-index: 10;
        }

        #plane {
            position: absolute;
            width: 80px;
            z-index: 5;
            display: none;
            transition: transform 0.1s;
        }

        /* Betting Panels */
        .betting-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 10px;
            background: #121214;
        }

        .bet-card {
            background: #1b1c20;
            border-radius: 15px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #282a2f;
        }

        .input-row {
            display: flex;
            align-items: center;
            background: #000;
            border-radius: 20px;
            padding: 5px 15px;
            margin-bottom: 8px;
            width: 80%;
        }

        .input-row input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            outline: none;
        }

        .action-btn {
            width: 100%;
            height: 55px;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.1s;
        }

        .btn-bet { background: #28a745; color: white; border-bottom: 4px solid #1e7e34; }
        .btn-cashout { background: #d9a507; color: black; border-bottom: 4px solid #a67c00; }
        .btn-waiting { background: #444; color: #888; border: none; cursor: default; }

        /* Animation Grid */
        .grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(#222 1px, transparent 1px), linear-gradient(90deg, #222 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
        }

        @media (max-width: 500px) {
            .betting-area { grid-template-columns: 1fr; }
            #multiplier { font-size: 3rem; }
        }
    </style>
</head>
<body>

<div class="top-nav">
    <div style="font-weight: 900; color: #fff;">AVIATOR</div>
    <div class="balance" id="balance">1,000.00 IQD</div>
</div>

<div class="history" id="history-box"></div>

<div class="game-view">
    <div class="grid"></div>
    <div id="multiplier">1.00x</div>
    <img id="plane" src="https://aviator-next.spribegaming.com/assets/plane.png" alt="plane">
</div>

<div class="betting-area">
    <div class="bet-card">
        <div class="input-row"><input type="number" id="amt1" value="100.00"></div>
        <button id="btn1" class="action-btn btn-bet" onclick="handleBet(1)">BET</button>
    </div>
    <div class="bet-card">
        <div class="input-row"><input type="number" id="amt2" value="100.00"></div>
        <button id="btn2" class="action-btn btn-bet" onclick="handleBet(2)">BET</button>
    </div>
</div>

<script>
    let wallet = 1000.0;
    let mult = 1.0;
    let flying = false;
    let crashPoint = 0;
    let activeBets = { 1: { on: false, amt: 0, cashed: false }, 2: { on: false, amt: 0, cashed: false } };

    const multEl = document.getElementById('multiplier');
    const planeEl = document.getElementById('plane');

    function resetRound() {
        mult = 1.0;
        flying = false;
        multEl.innerText = "WAIT NEXT ROUND";
        multEl.style.color = "#aaa";
        planeEl.style.display = "none";
        setTimeout(startRound, 5000); // 5 Seconds waiting like original
    }

    function startRound() {
        flying = true;
        crashPoint = (Math.random() * 5 + 1.01).toFixed(2);
        planeEl.style.display = "block";
        multEl.style.color = "white";
        
        for(let i=1; i<=2; i++) {
            if(activeBets[i].on) {
                const btn = document.getElementById('btn'+i);
                btn.innerText = "CASH OUT";
                btn.className = "action-btn btn-cashout";
            }
        }
        update();
    }

    function update() {
        if(!flying) return;
        mult += 0.001 * Math.pow(mult, 1.4);
        multEl.innerText = mult.toFixed(2) + "x";

        // Real Curve Movement
        let x = (mult - 1) * 70;
        let y = 200 - (Math.pow(mult - 1, 1.2) * 50);
        planeEl.style.left = Math.min(x, 250) + "px";
        planeEl.style.bottom = Math.min(y, 180) + "px";

        if(mult >= crashPoint) {
            doCrash();
        } else {
            requestAnimationFrame(update);
        }
    }

    function doCrash() {
        flying = false;
        multEl.innerText = "FLEW AWAY!";
        multEl.style.color = "var(--aviator-red)";
        planeEl.style.display = "none";
        
        addHistory(mult);
        
        for(let i=1; i<=2; i++) {
            activeBets[i].on = false;
            const btn = document.getElementById('btn'+i);
            btn.innerText = "BET";
            btn.className = "action-btn btn-bet";
        }
        setTimeout(resetRound, 3000);
    }

    function handleBet(id) {
        const btn = document.getElementById('btn'+id);
        const val = parseFloat(document.getElementById('amt'+id).value);

        if(!flying && !activeBets[id].on) {
            if(val > wallet) return;
            wallet -= val;
            activeBets[id] = { on: true, amt: val, cashed: false };
            btn.innerText = "WAITING...";
            btn.className = "action-btn btn-waiting";
            updateUI();
        } else if(flying && activeBets[id].on && !activeBets[id].cashed) {
            let win = (activeBets[id].amt * mult).toFixed(2);
            wallet += parseFloat(win);
            activeBets[id].cashed = true;
            btn.innerText = win;
            btn.className = "action-btn btn-waiting";
            updateUI();
        }
    }

    function addHistory(v) {
        const box = document.getElementById('history-box');
        const node = document.createElement('div');
        let cls = v < 2 ? 'blue' : (v < 10 ? 'purple' : 'gold');
        node.className = `h-node ${cls}`;
        node.innerText = parseFloat(v).toFixed(2) + 'x';
        box.prepend(node);
    }

    function updateUI() {
        document.getElementById('balance').innerText = wallet.toLocaleString() + " IQD";
    }

    resetRound();
</script>

</body>
</html>
