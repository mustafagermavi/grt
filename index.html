<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mustafa Dev - 1xbet Aviator Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: #101112; --panel-bg: #1c1d20; --accent: #28a745;
            --gold: #f2d06b; --danger: #eb445a; --blue: #3498db; --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: var(--main-bg); color: white; font-family: 'Press Start 2P', cursive; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            image-rendering: pixelated;
        }

        /* 1. Header & Stats */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; background: #161719; border-bottom: 2px solid #222; font-size: 8px;
        }
        .balance-box { color: var(--gold); border: 1px solid var(--gold); padding: 8px; border-radius: 4px; }

        /* 2. Real History Bar */
        .history {
            display: flex; gap: 8px; padding: 10px; background: #000; overflow-x: auto;
            border-bottom: 1px solid #333; height: 35px; align-items: center;
        }
        .h-tag { padding: 4px 8px; border-radius: 10px; font-size: 7px; min-width: 40px; text-align: center; }
        .h-low { background: #3498db; } .h-mid { background: #9b59b6; } .h-high { background: var(--gold); color: #000; }

        /* 3. The Main Stage (Graph Area) */
        .game-stage {
            flex-grow: 1; position: relative; background: radial-gradient(circle at bottom left, #1a1f2c, #101112);
            overflow: hidden; border-bottom: 2px solid #222;
        }
        .grid-line { position: absolute; width: 200%; height: 200%; background-image: linear-gradient(#222 1px, transparent 1px), linear-gradient(90deg, #222 1px, transparent 1px); background-size: 50px 50px; opacity: 0.5; animation: gridScroll 10s linear infinite; }
        @keyframes gridScroll { from { transform: translate(0, 0); } to { transform: translate(-50px, 50px); } }

        #plane {
            position: absolute; bottom: 20px; left: 20px; width: 50px; height: 35px;
            background: var(--danger); box-shadow: 6px 6px 0 #800; display: none; z-index: 10;
        }

        #mult-display {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2.8rem; font-weight: bold; text-shadow: 0 0 20px rgba(255,255,255,0.2); z-index: 5;
        }

        /* 4. Double Betting Panels */
        .bet-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; background: #161719; }
        .bet-card { background: var(--panel-bg); padding: 12px; border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        
        .input-row { display: flex; gap: 5px; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--gold); padding: 10px; font-family: 'Press Start 2P'; font-size: 10px; border-radius: 5px; }
        
        .quick-bet { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .q-btn { background: #2a2b2e; border: none; color: #ccc; font-size: 6px; padding: 8px; cursor: pointer; border-radius: 4px; }

        .main-btn { 
            width: 100%; padding: 18px 0; font-family: 'Press Start 2P'; font-size: 10px; 
            border: none; border-radius: 8px; cursor: pointer; color: white; transition: 0.2s;
            border-bottom: 4px solid rgba(0,0,0,0.3);
        }
        .btn-bet { background: #28a745; } .btn-cash { background: var(--gold); color: #000; } .btn-wait { background: #444; opacity: 0.7; }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            #mult-display { font-size: 2rem; }
            .bet-area { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div style="color:#888">MUSTAFA <span style="color:var(--accent)">DEV</span></div>
        <div class="balance-box" id="balance">1000.00 IQD</div>
    </header>

    <div class="history" id="history-list"></div>

    <div class="game-stage">
        <div class="grid-line"></div>
        <div id="plane"></div>
        <div id="mult-display">1.00x</div>
    </div>

    <div class="bet-area">
        <div class="bet-card">
            <div class="input-row"><input type="number" id="amt1" value="100"></div>
            <div class="quick-bet">
                <button class="q-btn" onclick="setAmt(1, 100)">100</button>
                <button class="q-btn" onclick="setAmt(1, 500)">500</button>
            </div>
            <button id="btn1" class="main-btn btn-bet" onclick="handleAction(1)">BET</button>
        </div>
        <div class="bet-card">
            <div class="input-row"><input type="number" id="amt2" value="100"></div>
            <div class="quick-bet">
                <button class="q-btn" onclick="setAmt(2, 200)">200</button>
                <button class="q-btn" onclick="setAmt(2, 1000)">1000</button>
            </div>
            <button id="btn2" class="main-btn btn-bet" onclick="handleAction(2)">BET</button>
        </div>
    </div>

    <script>
        let balance = 1000.00;
        let mult = 1.00;
        let isFlying = false;
        let crashAt = 0;
        let bets = {
            1: { active: false, amount: 0, cashed: false },
            2: { active: false, amount: 0, cashed: false }
        };

        function setAmt(id, val) { document.getElementById('amt'+id).value = val; }

        function handleAction(id) {
            const btn = document.getElementById('btn' + id);
            const amt = parseFloat(document.getElementById('amt' + id).value);

            if (!isFlying && !bets[id].active) {
                if (amt > balance) return;
                balance -= amt;
                bets[id] = { active: true, amount: amt, cashed: false };
                btn.innerText = "WAITING...";
                btn.className = "main-btn btn-wait";
                updateUI();
            } else if (isFlying && bets[id].active && !bets[id].cashed) {
                let win = (bets[id].amount * mult).toFixed(2);
                balance += parseFloat(win);
                bets[id].cashed = true;
                btn.innerText = "WON: " + win;
                btn.className = "main-btn btn-wait";
                updateUI();
            }
        }

        function gameLoop() {
            isFlying = false;
            document.getElementById('mult-display').innerText = "WAITING...";
            document.getElementById('mult-display').style.color = "white";
            document.getElementById('plane').style.display = "none";

            setTimeout(startFlight, 5000);
        }

        function startFlight() {
            isFlying = true;
            mult = 1.00;
            crashAt = (Math.random() * 7 + 1.05).toFixed(2);
            document.getElementById('plane').style.display = "block";
            
            for(let i=1; i<=2; i++) {
                if(bets[i].active) {
                    document.getElementById('btn'+i).innerText = "CASH OUT";
                    document.getElementById('btn'+i).className = "main-btn btn-cash";
                }
            }
            tick();
        }

        function tick() {
            if (!isFlying) return;
            mult += 0.007 * Math.pow(mult, 1.15);
            document.getElementById('mult-display').innerText = mult.toFixed(2) + "x";
            document.getElementById('mult-display').style.color = "var(--accent)";

            // Real Plane Curve
            let x = (mult - 1) * 45;
            let y = (mult - 1) * 25;
            document.getElementById('plane').style.left = (20 + x) + "px";
            document.getElementById('plane').style.bottom = (20 + y) + "px";

            if (mult >= crashAt) { crash(); } 
            else { requestAnimationFrame(tick); }
        }

        function crash() {
            isFlying = false;
            document.getElementById('mult-display').innerText = "FLEW AWAY!";
            document.getElementById('mult-display').style.color = "var(--danger)";
            document.getElementById('plane').style.display = "none";
            
            updateHistory(mult);

            for(let i=1; i<=2; i++) {
                bets[i].active = false;
                document.getElementById('btn'+i).innerText = "BET";
                document.getElementById('btn'+i).className = "main-btn btn-bet";
            }
            setTimeout(gameLoop, 3000);
        }

        function updateHistory(val) {
            const list = document.getElementById('history-list');
            const item = document.createElement('div');
            let color = val < 2 ? 'h-low' : (val < 10 ? 'h-mid' : 'h-high');
            item.className = `h-tag ${color}`;
            item.innerText = parseFloat(val).toFixed(2) + "x";
            list.prepend(item);
        }

        function updateUI() { document.getElementById('balance').innerText = balance.toFixed(2) + " IQD"; }

        gameLoop();
    </script>
</body>
</html>
